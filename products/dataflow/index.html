<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NetControl</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* 🌌 BACKGROUND */
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:#fff;
    padding:20px;
}

/* ✨ container */
.container{
    max-width:900px;
    margin:auto;
    text-align:center;
}

/* 🔙 BACK BUTTON (Apple style) */
.back-btn{
    position:fixed;
    top:15px;
    right:15px;
    padding:10px 18px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    color:#fff;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
    cursor:pointer;
}

.back-btn:hover{
    transform:scale(1.05);
    background:rgba(56,189,248,0.2);
}

/* 🖼️ MAIN LOGO */
.logo{
    width:120px;
    margin-top:50px;
    filter:drop-shadow(0 0 15px #38bdf8);
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    50%{transform:translateY(-10px);}
}

/* TITLE */
h1{
    font-size:28px;
    font-weight:700;
    margin-top:10px;
}

/* DESCRIPTION */
p{
    color:#cbd5e1;
    line-height:1.8;
}

/* FEATURES CARD */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:15px;
    border-radius:15px;
    margin-top:20px;
    border:1px solid rgba(255,255,255,0.08);
}

/* 🖼️ GALLERY */
.gallery{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:20px;
}

.gallery img{
    width:180px;
    border-radius:12px;
    transition:0.3s;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.1);
}

.gallery img:hover{
    transform:scale(1.05);
}

/* DOWNLOAD BUTTON */
.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:linear-gradient(45deg,#38bdf8,#0ea5e9);
    color:#000;
    border-radius:25px;
    text-decoration:none;
    font-weight:700;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* VERSION */
#version{
    margin-top:10px;
    color:#94a3b8;
}

/* MOBILE */
@media(max-width:600px){
    .gallery img{
        width:100%;
        max-width:250px;
    }

    h1{
        font-size:22px;
    }
}

</style>

</head>

<body>

<!-- 🔙 BACK BUTTON -->
<button class="back-btn" onclick="goBack()">⬅ رجوع</button>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <!-- TITLE -->
    <h1>NetControl</h1>

    <!-- DESCRIPTION -->
    <p>
        برنامج لإدارة الشبكات ومراقبة الأداء بشكل احترافي مع واجهة سهلة وسريعة.
    </p>

    <!-- FEATURES -->
    <div class="card">
        <h3>✔ المميزات</h3>
        <p>
            ✔ مراقبة الشبكة لحظيًا<br>
            ✔ أداء عالي وسرعة استجابة<br>
            ✔ واجهة بسيطة واحترافية
        </p>
    </div>

    <!-- GALLERY (صور البرنامج) -->
    <div class="gallery">
        <img src="img1.png">
        <img src="img2.png">
        <img src="img3.png">
    </div>

    <!-- VERSION -->
    <p id="version"></p>

    <!-- DOWNLOAD -->
    <a id="downloadBtn" class="btn">⬇ تحميل البرنامج</a>

</div>

<script src="../../download.js"></script>

<script>

/* ⚡ BACK BUTTON بدون إعادة تحميل intro */
function goBack(){
    if(document.referrer){
        window.history.back();
    } else {
        window.location.href = "../../index.html";
    }
}

/* DATA */
let data = DOWNLOADS["netcontrol"];

document.getElementById("version").innerText =
"الإصدار: v" + data.version;

document.getElementById("downloadBtn").href =
data.url;

</script>

</body>
</html>
